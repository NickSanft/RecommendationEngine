ktor {
  deployment {
    port = 8080
    port = ${?PORT}
    host = "0.0.0.0"
  }
  application {
    modules = [com.recengine.ApplicationKt.module]
  }
}

recengine {
  kafka {
    bootstrapServers = "localhost:9092"
    bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
    groupId = "recengine-consumer"
    topics {
      events   = "user-events"
      updates  = "model-updates"
      feedback = "feedback-events"
    }
    pollTimeoutMs  = 500
    maxPollRecords = 500
  }

  redis {
    uri = "redis://localhost:6379"
    uri = ${?REDIS_URI}
    sessionTtlSeconds = 1800
    featureTtlSeconds = 86400
  }

  model {
    fm {
      numFactors     = 16
      learningRate   = 0.01
      regularization = 0.001
      numFeatures    = 50000
    }
    bandit {
      epsilon    = 0.1
      ucbAlpha   = 1.0
      windowSize = 10000
    }
    scoring {
      sessionWeight    = 0.4
      contentWeight    = 0.35
      popularityWeight = 0.15
      recencyWeight    = 0.1
    }
  }

  ab {
    salt     = "recengine-ab-v1"
    variants = ["control", "fm_v1", "bandit_ucb"]
  }
}
